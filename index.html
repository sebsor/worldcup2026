<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a7a3c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#1a7a3c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#1a1a1a;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.content{background:#f4f4f4;min-height:calc(100vh - 110px)}

/* Header */
.hdr{background:#1a7a3c;color:#fff;padding:16px 16px 0;padding-top:calc(16px + env(safe-area-inset-top))}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:12px;opacity:0.8;margin-top:2px}
.hdr-tz{display:flex;align-items:center;gap:6px}
.hdr-tz select{font-size:11px;padding:4px 6px;border:1px solid rgba(255,255,255,0.4);border-radius:6px;background:rgba(255,255,255,0.15);color:#fff;font-family:inherit;cursor:pointer;max-width:150px}
.hdr-tz select option{background:#1a7a3c;color:#fff}
.tv-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);border-radius:6px;width:30px;height:30px;font-size:15px;cursor:pointer;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tv-btn:active{background:rgba(255,255,255,0.3)}

/* Tab bar */
.tabs{display:flex;overflow-x:auto;background:#155f2e;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-left:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab.on{color:#fff;border-bottom-color:#fff}

/* Content */
.content{padding:16px;max-width:900px;margin:0 auto}

/* Next match card */
.nmatch{background:#1a7a3c;border-radius:12px;padding:16px;margin-bottom:16px;color:#fff}
.nm-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.8;margin-bottom:8px}
.nm-teams{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nm-teams img{border-radius:2px;flex-shrink:0}
.nm-vs{opacity:0.5;font-weight:400;font-size:14px}
.nm-meta{font-size:12px;opacity:0.85;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.countdown{display:flex;gap:8px;align-items:flex-end}
.cd-u{text-align:center}
.cd-n{font-size:26px;font-weight:700;line-height:1;display:block}
.cd-l{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;opacity:0.8;display:block;margin-top:2px}
.cd-s{font-size:20px;opacity:0.6;padding-bottom:14px}

/* Stat grid */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:480px){.sgrid{grid-template-columns:repeat(4,1fr)}}
.scard{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e8e8e8}
.sc-l{font-size:11px;color:#888;margin-bottom:3px;display:block}
.sc-v{font-size:20px;font-weight:700;color:#1a1a1a;display:block}

/* Section heading */
.sh{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px;margin-top:4px}

/* Match rows */
.mlist{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.mrow{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;font-size:13px}
.mrow-hdr{display:flex;justify-content:space-between;padding:6px 12px;font-size:10px;color:#888;background:#fafafa;border-bottom:1px solid #f0f0f0}
.mrow-teams{display:grid;grid-template-columns:1fr 54px 1fr;align-items:center;min-height:48px}
.mleft{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:10px 18px 10px 10px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%);min-width:0}
.mmid{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;background:#fff;z-index:1}
.mright{display:flex;align-items:center;gap:6px;padding:10px 10px 10px 18px;clip-path:polygon(10px 0,100% 0,100% 100%,10px 100%,0 50%);min-width:0}
.m-name{font-weight:600;font-size:13px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
.m-grp{font-size:10px;color:#aaa;font-weight:400;flex-shrink:0;white-space:nowrap}
.m-score{font-size:15px;font-weight:700;color:#1a1a1a;text-align:center;white-space:nowrap}
.m-vs{font-size:11px;color:#ccc;text-align:center}

/* Group grid */
.ggrid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.ggrid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1000px){.ggrid{grid-template-columns:repeat(3,1fr)}}
.gcard{background:#fff;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden}
.gcard.gr-dim{opacity:0.15;transition:opacity 0.2s}
.gcard.gr-match{opacity:1;transition:opacity 0.2s}
.ghead{padding:10px 12px 8px;border-bottom:1px solid #efefef;display:flex;justify-content:space-between;align-items:center;border-left:4px solid #ccc}
.gname{font-size:13px;font-weight:700;color:#1a1a1a}
.gtbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.gtbl .ghdr{padding:5px 6px;color:#999;font-weight:400;text-align:right;font-size:10px;border:none;cursor:default;background:#fafafa}
.gtbl .ghdr:first-child{text-align:left;width:42%}
.gtbl td{padding:6px 6px;color:#1a1a1a;text-align:right;border-top:1px solid #f3f3f3;border-left:none;border-right:none;border-bottom:none;font-size:11px}
.gtbl td:first-child{text-align:left}
.tcell{display:flex;align-items:center;gap:4px;font-size:11px}
.pbadge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;font-size:9px;font-weight:700;color:#888;flex-shrink:0}
.p1{background:#FAC775;color:#633806}
.p2{background:#D3D1C7;color:#2C2C2A}
.gnext{padding:6px 12px;font-size:10px;color:#aaa;border-top:1px solid #f0f0f0;display:block}

/* Group search */
.gr-search-wrap{margin-bottom:14px;display:flex;align-items:center;gap:8px}
.gr-search{flex:1;padding:9px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit;color:#1a1a1a;background:#fff}
.gr-search:focus{border-color:#1a7a3c}
.gr-clear{font-size:12px;color:#aaa;cursor:pointer;background:none;border:none;padding:0 4px;font-family:inherit;white-space:nowrap}

/* Filter bar */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fbtn{padding:6px 12px;font-size:12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;color:#666;font-family:inherit;white-space:nowrap}
.fbtn.on{background:#1a7a3c;color:#fff;border-color:#1a7a3c;font-weight:600}

/* Day header */
.dhead{font-size:12px;font-weight:600;color:#777;padding:14px 0 6px;border-bottom:1px solid #eee;margin-top:4px}

/* Knockout */
.ko-list{display:flex;flex-direction:column;gap:8px}
.ko-round-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#aaa;margin-top:20px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.ko-round-hdr:first-child{margin-top:0}
.ko-match{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden}
.ko-slot{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:13px}
.ko-slot.winner{font-weight:700}
.ko-slot-score{margin-left:auto;font-weight:700;font-size:13px;color:#1a1a1a}
.ko-divider{height:1px;background:#f0f0f0}
.ko-meta{padding:4px 12px;font-size:10px;color:#aaa;background:#fafafa}
.ko-ph{color:#bbb;font-style:italic}

/* Stadiums */
.stad-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:480px){.stad-grid{grid-template-columns:repeat(2,1fr)}}
.stad-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden}
.stad-head{padding:10px 12px;background:#f9f9f9;border-bottom:1px solid #f0f0f0}
.stad-name{font-size:13px;font-weight:600;color:#1a1a1a}
.stad-note{font-size:10px;color:#888;margin-top:2px;display:block}
.stad-city{font-size:11px;color:#888;margin-top:4px;display:flex;align-items:center;gap:6px}
.stad-ctry{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.ctry-us{background:#e3f2fd;color:#1565c0}
.ctry-mx{background:#e8f5e9;color:#2e7d32}
.ctry-ca{background:#fff3e0;color:#e65100}
.stad-body{padding:8px 12px}
.stad-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-top:1px solid #f5f5f5}
.stad-row:first-child{border-top:none}
.stad-lbl{color:#888}
.stad-val{color:#1a1a1a;font-weight:600}
.stad-cap{font-size:15px}

/* Scorers */
.sc-grid{display:grid;grid-template-columns:1fr;gap:6px}
@media(min-width:480px){.sc-grid{grid-template-columns:repeat(2,1fr)}}
.sc-row{display:grid;grid-template-columns:28px 28px 1fr;gap:8px;align-items:center;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:8px 12px;font-size:13px}
.sc-pos{font-size:11px;color:#aaa;text-align:center}
.sc-goals{font-size:18px;font-weight:700;color:#1a1a1a;text-align:center}
.sc-name{color:#1a1a1a;font-weight:500}
.sc-team{font-size:11px;color:#888}

/* Fun facts */
.fcard{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px;margin-bottom:10px}
.flbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px}
.ftxt{font-size:13px;color:#333;line-height:1.65}

/* Misc */
.wload{color:#888;font-size:14px;padding:40px;text-align:center}
.notice{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#795548}

/* Ticket modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:20px;height:85vh;max-height:85vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-drag{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.modal-match{font-size:12px;color:#888;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;margin-top:-4px}
.ticket-range{background:#f0faf4;border:1px solid #b2dfca;border-radius:10px;padding:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.ticket-from{font-size:11px;color:#555;margin-bottom:3px}
.ticket-price{font-size:22px;font-weight:700;color:#1a7a3c}
.ticket-price-high{font-size:22px;font-weight:700;color:#c0392b}
.modal-fact{display:flex;gap:10px;padding:10px 0;border-top:1px solid #f0f0f0;font-size:12px;color:#444;line-height:1.5}
.modal-fact-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.modal-disclaimer{font-size:11px;color:#aaa;margin-top:14px;line-height:1.5;padding-top:12px;border-top:1px solid #f0f0f0}
.ticket-btn{display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a7a3c;background:none;border:none;cursor:pointer;padding:2px 0;font-family:inherit;gap:3px;width:100%}

/* TV schedule modal */
.tv-day{font-size:11px;font-weight:700;color:#1a7a3c;text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #eee}
.tv-day:first-child{margin-top:0}
.tv-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.tv-row:last-child{border-bottom:none}
.tv-time{font-size:12px;color:#888;min-width:90px;flex-shrink:0}
.tv-match{flex:1;color:#1a1a1a;font-weight:500;line-height:1.3}
.tv-venue{font-size:11px;color:#aaa;display:block;margin-top:1px;font-weight:400}
.tv-chan{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap}
.tv-tv4{background:#0090d4;color:#fff}
.tv-svt1{background:#1a7a3c;color:#fff}
.tv-svt2{background:#5cb85c;color:#fff}
.tv-search{padding:9px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit;color:#1a1a1a;background:#fff;width:100%;margin-bottom:12px}
.tv-search:focus{border-color:#1a7a3c}
.tv-list{flex:1;min-height:0;overflow-y:auto}
#tm-body{flex:1;min-height:0;display:flex;flex-direction:column}
</style>
</head>
<body>

<div class="modal-overlay" id="ticket-modal" onclick="if(event.target===this)closeTicketModal()">
  <div class="modal">
    <div class="modal-drag"></div>
    <button class="modal-close" onclick="closeTicketModal()">&#10005;</button>
    <div class="modal-title" id="tm-title"></div>
    <div class="modal-match" id="tm-match"></div>
    <div id="tm-body"></div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">&#9917; World Cup 2026</div>
      <div class="hdr-sub">Canada &bull; Mexico &bull; USA &bull; 11 Jun &ndash; 19 Jul</div>
    </div>
    <div class="hdr-tz">
      <button class="tv-btn" onclick="openTvModal()" title="TV schedule">&#128250;</button>
      <select id="wc-tz" onchange="wcTzChange(this.value)">
        <option value="Europe/Stockholm">Stockholm</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Paris">Paris</option>
        <option value="Europe/Berlin">Berlin</option>
        <option value="Europe/Helsinki">Helsinki</option>
        <option value="Europe/Moscow">Moscow</option>
        <option value="America/New_York">New York</option>
        <option value="America/Chicago">Chicago</option>
        <option value="America/Denver">Denver</option>
        <option value="America/Los_Angeles">Los Angeles</option>
        <option value="America/Toronto">Toronto</option>
        <option value="America/Mexico_City">Mexico City</option>
        <option value="Asia/Dubai">Dubai</option>
        <option value="Asia/Kolkata">Mumbai/Delhi</option>
        <option value="Asia/Singapore">Singapore</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Australia/Sydney">Sydney</option>
        <option value="UTC">UTC</option>
      </select>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab on" onclick="wcTab('overview',this)">Overview</button>
    <button class="tab" onclick="wcTab('groups',this)">Groups</button>
    <button class="tab" onclick="wcTab('matches',this)">Matches</button>
    <button class="tab" onclick="wcTab('knockout',this)">Knockout</button>
    <button class="tab" onclick="wcTab('stadiums',this)">Stadiums</button>
    <button class="tab" onclick="wcTab('scorers',this)">Scorers</button>
    <button class="tab" onclick="wcTab('facts',this)">Fun Facts</button>
  </div>
</div>

<div class="content">
  <div id="wc-ov" class="wsec"><div class="wload">Loading...</div></div>
  <div id="wc-gr" class="wsec" style="display:none"><div class="wload">Loading...</div></div>
  <div id="wc-ma" class="wsec" style="display:none"><div class="wload">Loading...</div></div>
  <div id="wc-ko" class="wsec" style="display:none"></div>
  <div id="wc-st" class="wsec" style="display:none"></div>
  <div id="wc-sc" class="wsec" style="display:none"></div>
  <div id="wc-fa" class="wsec" style="display:none"></div>
</div>

<script>
var FLAGS={
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Canada':'ca',
  'Qatar':'qa','Switzerland':'ch','Brazil':'br','Morocco':'ma',
  'Haiti':'ht','Scotland':'gb-sct','USA':'us','Paraguay':'py',
  'Australia':'au','Germany':'de','Ivory Coast':'ci','Ecuador':'ec',
  'Netherlands':'nl','Japan':'jp','Tunisia':'tn','Belgium':'be',
  'Egypt':'eg','Iran':'ir','New Zealand':'nz','Spain':'es',
  'Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy','France':'fr',
  'Senegal':'sn','Norway':'no','Argentina':'ar','Algeria':'dz',
  'Austria':'at','Jordan':'jo','Portugal':'pt','Uzbekistan':'uz',
  'Colombia':'co','England':'gb-eng','Croatia':'hr','Ghana':'gh',
  'Panama':'pa','Cura\u00e7ao':'cw','DR Congo':'cd','Iraq':'iq',
  'Turkey':'tr','Sweden':'se','Bosnia':'ba','Czech Republic':'cz',
  'Czechia':'cz','T\u00fcrkiye':'tr'
};

var GRP_COLORS={
  'Group A':{bg:'#fff0f0',border:'#e57373'},
  'Group B':{bg:'#fff5e6',border:'#ffa040'},
  'Group C':{bg:'#fffde7',border:'#f0c000'},
  'Group D':{bg:'#f0fff0',border:'#66bb6a'},
  'Group E':{bg:'#e8f5e9',border:'#26a69a'},
  'Group F':{bg:'#e3f2fd',border:'#42a5f5'},
  'Group G':{bg:'#ede7f6',border:'#7e57c2'},
  'Group H':{bg:'#fce4ec',border:'#ec407a'},
  'Group I':{bg:'#e0f7fa',border:'#26c6da'},
  'Group J':{bg:'#f3e5f5',border:'#ab47bc'},
  'Group K':{bg:'#e8eaf6',border:'#5c6bc0'},
  'Group L':{bg:'#fafafa',border:'#78909c'}
};

var currentTz='Europe/Stockholm';
var currentTzLabel='Stockholm';
var matches=[],grps={},teamGrp={},cdTimer=null,curF='all',stadMatchCounts={};

function toUtcDate(date,rawTime){
  var p=rawTime.split(':'),h=parseInt(p[0]),mn=parseInt(p[1])||0;
  var m=rawTime.match(/UTC([+-][\d.]+)/);
  var srcOff=m?parseFloat(m[1]):0;
  var d=new Date(date+'T00:00:00Z');
  d.setUTCMinutes(d.getUTCMinutes()+h*60+mn-srcOff*60);
  return d;
}

function convertTime(date,rawTime){
  var utc=toUtcDate(date,rawTime);
  var fmt=new Intl.DateTimeFormat('sv-SE',{timeZone:currentTz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
  var parts=fmt.format(utc).replace(',','').split(' ');
  return {date:parts[0],time:parts[1]};
}

function recomputeTimes(){
  matches=matches.map(function(m){
    var c=convertTime(m.date,m.rawTime);
    return Object.assign({},m,{tzDate:c.date,tzTime:c.time});
  });
}

function flag(name,size){
  if(!name) return '';
  size=size||16;
  for(var k in FLAGS){
    if(name.indexOf(k)!==-1)
      return '<img src="https://flagcdn.com/20x15/'+FLAGS[k]+'.png" width="'+size+'" height="'+Math.round(size*0.75)+'" style="vertical-align:middle;border-radius:2px;flex-shrink:0" alt="">';
  }
  return '';
}

function pad(n){return n<10?'0'+n:''+n;}

function fmtDate(ds){
  var d=new Date(ds+'T00:00:00');
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
}

function isPH(t){return !t||/^[12W3]/.test(t)||t.indexOf('winner')!==-1||t.indexOf('Path')!==-1||t.indexOf('IC ')!==-1;}
function teamBg(name){var g=teamGrp[name];return g&&GRP_COLORS[g]?GRP_COLORS[g].bg:'#f5f5f5';}
function groupLetter(name){var g=teamGrp[name];return g?'('+g.replace('Group ','')+')':'';}

function mrow(m){
  var has=m.score1!==undefined&&m.score2!==undefined;
  var sc=has?'<div class="m-score">'+m.score1+' \u2013 '+m.score2+'</div>':'<div class="m-vs">vs</div>';
  var bg1=teamBg(m.team1),bg2=teamBg(m.team2);
  var matchStr=JSON.stringify({t1:m.team1,t2:m.team2,round:m.round||m.group,date:fmtDate(m.tzDate),time:m.tzTime}).replace(/'/g,'&#39;');
  return '<div class="mrow">'+
    '<div class="mrow-hdr"><span>'+fmtDate(m.tzDate)+' &middot; '+m.tzTime+' '+currentTzLabel+'</span><span>'+m.ground+'</span></div>'+
    '<div class="mrow-teams">'+
      '<div class="mleft" style="background:'+bg1+'">'+
        '<span class="m-grp">'+groupLetter(m.team1)+'</span>'+
        '<span class="m-name">'+m.team1+'</span>'+
        flag(m.team1,18)+
      '</div>'+
      '<div class="mmid" style="flex-direction:column;gap:4px">'+

}

function load(){
  var x=new XMLHttpRequest();
  x.open('GET','https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json',true);
  x.onload=function(){
    if(x.status!==200){document.getElementById('wc-ov').innerHTML='<div class="wload">Failed to load (HTTP '+x.status+')</div>';return;}
    var data=JSON.parse(x.responseText);
    matches=data.matches.map(function(m){
      var c=convertTime(m.date,m.time);
      var s1=m.score&&m.score.ft?m.score.ft[0]:m.score1;
      var s2=m.score&&m.score.ft?m.score.ft[1]:m.score2;
      return {round:m.round,date:m.date,rawTime:m.time,tzDate:c.date,tzTime:c.time,
        team1:m.team1,team2:m.team2,group:m.group||'',ground:m.ground||'',
        score1:s1,score2:s2,num:m.num,goals1:m.goals1||[],goals2:m.goals2||[]};
    });
    buildGroups(); buildTeamGrpMap(); buildStadMatchCounts();
    renderOv(); renderGr(); renderMa('all'); renderSt(); renderSc(); renderFa();
  };
  x.onerror=function(){document.getElementById('wc-ov').innerHTML='<div class="wload">Network error. Check your connection.</div>';};
  x.send();
}

function buildGroups(){
  grps={};
  matches.filter(function(m){return m.group;}).forEach(function(m){
    var g=m.group;
    if(!grps[g]) grps[g]={teams:{},matches:[]};
    grps[g].matches.push(m);
    [m.team1,m.team2].forEach(function(t){
      if(t&&!isPH(t)&&!grps[g].teams[t]) grps[g].teams[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    });
    if(m.score1!==undefined&&m.score2!==undefined){upd(g,m.team1,m.score1,m.score2);upd(g,m.team2,m.score2,m.score1);}
  });
}

function upd(g,name,gf,ga){
  if(!grps[g]||!grps[g].teams[name]) return;
  var t=grps[g].teams[name];
  t.p++;t.gf+=gf;t.ga+=ga;
  if(gf>ga){t.w++;t.pts+=3;}else if(gf===ga){t.d++;t.pts++;}else t.l++;
}

function buildTeamGrpMap(){teamGrp={};Object.keys(grps).forEach(function(g){Object.keys(grps[g].teams).forEach(function(t){teamGrp[t]=g;});});}
function buildStadMatchCounts(){stadMatchCounts={};matches.forEach(function(m){if(m.ground)stadMatchCounts[m.ground]=(stadMatchCounts[m.ground]||0)+1;});}

function tick(target){
  var el=document.getElementById('wcd');
  if(!el){clearInterval(cdTimer);return;}
  var diff=target-new Date();
  if(diff<=0){el.innerHTML='<span style="font-size:14px;font-weight:700">Live now!</span>';return;}
  var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  el.innerHTML=(d>0?'<div class="cd-u"><span class="cd-n">'+d+'</span><span class="cd-l">days</span></div><span class="cd-s">:</span>':'')+
    '<div class="cd-u"><span class="cd-n">'+pad(h)+'</span><span class="cd-l">hrs</span></div><span class="cd-s">:</span>'+
    '<div class="cd-u"><span class="cd-n">'+pad(m)+'</span><span class="cd-l">min</span></div><span class="cd-s">:</span>'+
    '<div class="cd-u"><span class="cd-n">'+pad(s)+'</span><span class="cd-l">sec</span></div>';
}

function renderKo(){
  var byRound={R32:[],R16:[],QF:[],SF:[],FI:[]};
  var roundMap={'Round of 32':'R32','Round of 16':'R16','Quarter-final':'QF','Semi-final':'SF','Final':'FI'};
  matches.forEach(function(m){var k=roundMap[m.round];if(k) byRound[k].push(m);});
  Object.keys(byRound).forEach(function(k){byRound[k].sort(function(a,b){return (a.num||0)-(b.num||0);});});
  var played=0,total=0;
  Object.keys(byRound).forEach(function(k){
    total+=byRound[k].length;
    played+=byRound[k].filter(function(m){return m.score1!==undefined;}).length;
  });

  // Layout
  var SH=46,SGAP=3,CW=162,CGAP=36,LH=22,META=18,VGAP=8;
  var PH=SH*2+SGAP, CH=META+PH, ROW=CH+VGAP;
  var LC='#ccc', FC='#1a7a3c';

  function f(n){return parseFloat(n.toFixed(1));}
  function friendlyPH(t){
    if(!t) return 'TBD';
    // Winner of specific match
    var wm=t.match(/^W(\d+)$/);
    if(wm){
      var n=parseInt(wm[1]);
      if(n>=73&&n<=88) return 'R32 Winner';
      if(n>=89&&n<=96) return 'R16 Winner';
      if(n>=97&&n<=100) return 'QF Winner';
      if(n>=101&&n<=102) return 'SF Winner';
      return 'Match Winner';
    }
    // 1st/2nd from group
    var gm=t.match(/^([12])([A-L])$/);
    if(gm) return (gm[1]==='1'?'1st':'2nd')+' Group '+gm[2];
    // Best 3rd place
    if(t.match(/^3[A-L]/)) return 'Best 3rd';
    // path/winner text
    if(t.indexOf('winner')!==-1) return 'Match Winner';
    if(t.indexOf('Path')!==-1) return 'Path Winner';
    if(t.indexOf('IC ')!==-1) return 'IC Winner';
    return t;
  }
  function isPH2(t){return !t||/^[12W3]/.test(t)||t.indexOf('winner')!==-1||t.indexOf('Path')!==-1||t.indexOf('IC ')!==-1;}

  // Y of match card top for match idx with spacing sp
  function cardTop(idx,sp){return LH+((sp-1)/2)*ROW+idx*sp*ROW;}
  // Y of match center
  function cardCY(idx,sp){return cardTop(idx,sp)+META+PH/2;}

  // Total SVG height
  var svgH=LH+7*ROW+CH; // 8 R32 matches

  // Column X positions (left half, then final, then right half)
  // Left: R32=0, conn, R16, conn, QF, conn, SF, conn
  // Right: conn, SF, conn, QF, conn, R16, conn, R32
  var x={};
  x.lR32=0;
  x.lConn1=x.lR32+CW;
  x.lR16=x.lConn1+CGAP;
  x.lConn2=x.lR16+CW;
  x.lQF=x.lConn2+CGAP;
  x.lConn3=x.lQF+CW;
  x.lSF=x.lConn3+CGAP;
  x.lConnF=x.lSF+CW;
  x.FIN=x.lConnF+CGAP;
  x.rConnF=x.FIN+CW;
  x.rSF=x.rConnF+CGAP;
  x.rConn3=x.rSF+CW;
  x.rQF=x.rConn3+CGAP;
  x.rConn2=x.rQF+CW;
  x.rR16=x.rConn2+CGAP;
  x.rConn1=x.rR16+CW;
  x.rR32=x.rConn1+CGAP;
  var totalW=x.rR32+CW;

  var L32=byRound.R32.slice(0,8), R32=byRound.R32.slice(8);
  var L16=byRound.R16.slice(0,4), R16=byRound.R16.slice(4);
  var LQF=byRound.QF.slice(0,2),  RQF=byRound.QF.slice(2);
  var LSF=byRound.SF.slice(0,1),  RSF=byRound.SF.slice(1);
  var FI=byRound.FI[0];

  var html='';

  // ---- foreignObject for each match card ----
  function matchFO(m, cx, idx, sp, side){
    if(!m) return '';
    var ct=cardTop(idx,sp);
    var has=m.score1!==undefined&&m.score2!==undefined;
    var w1=has&&(m.score1-m.score2>0), w2=has&&(m.score2-m.score1>0);
    var l1=has&&!w1, l2=has&&!w2;

    function slotHtml(name,score,isW,isL){
      var ph=isPH2(name);
      var bg=ph?'#f5f5f5':teamBg(name);
      var tc=ph?'#bbb':'#1a1a1a';
      var nm=ph?('<span style="font-style:italic;color:#999">'+friendlyPH(name)+'</span>'):(flag(name)+name);
      var sc=score!==undefined?'<span style="font-size:10px;font-weight:700;color:'+(isW?FC:'#666')+';margin-left:auto;padding-left:4px">'+score+'</span>':'';
      return '<div style="height:'+SH+'px;background:'+bg+';border:'+(isW?'1.5px solid '+FC:'1px solid #e0e0e0')+
        ';display:flex;align-items:center;padding:0 6px;overflow:hidden;opacity:'+(isL?0.32:1)+'">'+
        '<span style="font-size:10px;color:'+tc+';font-weight:'+(isW?700:400)+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">'+nm+'</span>'+sc+'</div>';
    }

    var inner='<div style="font-size:9px;color:#aaa;height:'+META+'px;line-height:'+META+'px;white-space:nowrap;overflow:hidden">'+
      fmtDate(m.tzDate)+' \u00b7 '+m.tzTime+'</div>'+
      '<div style="overflow:hidden;border-radius:5px 5px 0 0">'+slotHtml(m.team1,m.score1,w1,l1)+'</div>'+
      '<div style="height:'+SGAP+'px;background:#eee"></div>'+
      '<div style="overflow:hidden;border-radius:0 0 5px 5px">'+slotHtml(m.team2,m.score2,w2,l2)+'</div>';

    return '<foreignObject x="'+f(cx)+'" y="'+f(ct)+'" width="'+CW+'" height="'+CH+'">'+
      '<div xmlns="http://www.w3.org/1999/xhtml">'+inner+'</div></foreignObject>';
  }

  // Final card - centered vertically at SF cy
  function finalFO(){
    var sfCY=cardCY(0,8);
    var ct=sfCY-META-PH/2;
    var has=FI&&FI.score1!==undefined&&FI.score2!==undefined;
    var w1=has&&(FI&&FI.score1-FI.score2>0), w2=has&&(FI&&FI.score2-FI.score1>0);
    var l1=has&&!w1, l2=has&&!w2;

    function slotHtml(name,score,isW,isL){
      var ph=isPH2(name);
      var bg=ph?'#f5f5f5':teamBg(name);
      var tc=ph?'#bbb':'#1a1a1a';
      var nm=ph?('<span style="font-style:italic;color:#999">'+friendlyPH(name)+'</span>'):(flag(name)+name);
      var sc=score!==undefined?'<span style="font-size:10px;font-weight:700;color:'+(isW?FC:'#666')+';margin-left:auto;padding-left:4px">'+score+'</span>':'';
      return '<div style="height:'+SH+'px;background:'+bg+';border:'+(isW?'1.5px solid '+FC:'1px solid #e0e0e0')+
        ';display:flex;align-items:center;padding:0 6px;overflow:hidden;opacity:'+(isL?0.32:1)+'">'+
        '<span style="font-size:10px;color:'+tc+';font-weight:'+(isW?700:400)+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">'+nm+'</span>'+sc+'</div>';
    }

    var t1=FI?FI.team1:'TBD', t2=FI?FI.team2:'TBD';
    var s1=FI?FI.score1:undefined, s2=FI?FI.score2:undefined;
    var inner='<div style="font-size:9px;color:#aaa;height:'+META+'px;line-height:'+META+'px;text-align:center">'+(FI?(fmtDate(FI.tzDate)+' \u00b7 '+FI.tzTime):'&nbsp;')+'</div>'+
      '<div style="overflow:hidden;border-radius:5px 5px 0 0">'+slotHtml(t1,s1,w1,l1)+'</div>'+
      '<div style="height:'+SGAP+'px;background:#eee"></div>'+
      '<div style="overflow:hidden;border-radius:0 0 5px 5px">'+slotHtml(t2,s2,w2,l2)+'</div>';

    return '<foreignObject x="'+f(x.FIN)+'" y="'+f(ct)+'" width="'+CW+'" height="'+CH+'">'+
      '<div xmlns="http://www.w3.org/1999/xhtml">'+inner+'</div></foreignObject>';
  }

  // ---- SVG lines ----
  function line(x1,y1,x2,y2){
    return '<line x1="'+f(x1)+'" y1="'+f(y1)+'" x2="'+f(x2)+'" y2="'+f(y2)+'" stroke="'+LC+'" stroke-width="1.5" stroke-linecap="round"/>';
  }

  function linesLR(){
    var s='';
    var mx1,mx2,mx3,mx4,y1,y2,yr,yq,yq1,yq2,ysf,rsfCY,yr1,yr2;

    // Left: R32 -> R16
    for(var i=0;i<4;i++){
      y1=cardCY(i*2,1); y2=cardCY(i*2+1,1); yr=cardCY(i,2);
      mx1=x.lR32+CW+CGAP/2;
      s+=line(x.lR32+CW,y1,mx1,y1)+line(mx1,y1,mx1,yr)+line(mx1,yr,x.lR16,yr);
      s+=line(x.lR32+CW,y2,mx1,y2)+line(mx1,y2,mx1,yr);
    }
    // Left: R16 -> QF
    for(var i=0;i<2;i++){
      y1=cardCY(i*2,2); y2=cardCY(i*2+1,2); yr=cardCY(i,4);
      mx2=x.lR16+CW+CGAP/2;
      s+=line(x.lR16+CW,y1,mx2,y1)+line(mx2,y1,mx2,yr)+line(mx2,yr,x.lQF,yr);
      s+=line(x.lR16+CW,y2,mx2,y2)+line(mx2,y2,mx2,yr);
    }
    // Left: QF -> SF
    yq1=cardCY(0,4); yq2=cardCY(1,4); ysf=cardCY(0,8);
    mx3=x.lQF+CW+CGAP/2;
    s+=line(x.lQF+CW,yq1,mx3,yq1)+line(mx3,yq1,mx3,ysf)+line(mx3,ysf,x.lSF,ysf);
    s+=line(x.lQF+CW,yq2,mx3,yq2)+line(mx3,yq2,mx3,ysf);
    // Left: SF -> Final
    s+=line(x.lSF+CW,ysf,x.FIN,ysf);

    // Right: Final -> SF
    rsfCY=cardCY(0,8);
    s+=line(x.FIN+CW,rsfCY,x.rSF,rsfCY);
    // Right: SF -> QF
    yq1=cardCY(0,4); yq2=cardCY(1,4);
    mx3=x.rSF+CW+CGAP/2;
    s+=line(x.rSF+CW,rsfCY,mx3,rsfCY)+line(mx3,rsfCY,mx3,yq1)+line(mx3,yq1,x.rQF,yq1);
    s+=line(mx3,rsfCY,mx3,yq2)+line(mx3,yq2,x.rQF,yq2);
    // Right: QF -> R16
    for(var i=0;i<2;i++){
      yq=cardCY(i,4); yr1=cardCY(i*2,2); yr2=cardCY(i*2+1,2);
      mx4=x.rQF+CW+CGAP/2;
      s+=line(x.rQF+CW,yq,mx4,yq)+line(mx4,yq,mx4,yr1)+line(mx4,yr1,x.rR16,yr1);
      s+=line(mx4,yq,mx4,yr2)+line(mx4,yr2,x.rR16,yr2);
    }
    // Right: R16 -> R32
    for(var i=0;i<4;i++){
      yr=cardCY(i,2); y1=cardCY(i*2,1); y2=cardCY(i*2+1,1);
      mx1=x.rR16+CW+CGAP/2;
      s+=line(x.rR16+CW,yr,mx1,yr)+line(mx1,yr,mx1,y1)+line(mx1,y1,x.rR32,y1);
      s+=line(mx1,yr,mx1,y2)+line(mx1,y2,x.rR32,y2);
    }
    return s;
  }

  // ---- Round labels ----
  function labels(){
    var rounds=[
      {label:'ROUND OF 32',cx:x.lR32+CW/2},
      {label:'ROUND OF 16',cx:x.lR16+CW/2},
      {label:'QF',cx:x.lQF+CW/2},
      {label:'SF',cx:x.lSF+CW/2},
      {label:'\uD83C\uDFC6 FINAL',cx:x.FIN+CW/2},
      {label:'SF',cx:x.rSF+CW/2},
      {label:'QF',cx:x.rQF+CW/2},
      {label:'ROUND OF 16',cx:x.rR16+CW/2},
      {label:'ROUND OF 32',cx:x.rR32+CW/2}
    ];
    return rounds.map(function(r){
      return '<text x="'+f(r.cx)+'" y="'+f(LH-4)+'" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="0.5">'+r.label+'</text>';
    }).join('');
  }

  // Build all foreignObjects
  var fos='';
  L32.forEach(function(m,i){fos+=matchFO(m,x.lR32,i,1,'left');});
  L16.forEach(function(m,i){fos+=matchFO(m,x.lR16,i,2,'left');});
  LQF.forEach(function(m,i){fos+=matchFO(m,x.lQF,i,4,'left');});
  LSF.forEach(function(m,i){fos+=matchFO(m,x.lSF,i,8,'left');});
  fos+=finalFO();
  RSF.forEach(function(m,i){fos+=matchFO(m,x.rSF,i,8,'right');});
  RQF.forEach(function(m,i){fos+=matchFO(m,x.rQF,i,4,'right');});
  R16.forEach(function(m,i){fos+=matchFO(m,x.rR16,i,2,'right');});
  R32.forEach(function(m,i){fos+=matchFO(m,x.rR32,i,1,'right');});

  var notice=played===0
    ?'<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#795548">&#128336; Knockout stage begins 28 June. Teams fill in as the group stage concludes.</div>'
    :'';

  var svgStr='<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="'+totalW+'" height="'+svgH+'" style="display:block;overflow:visible">'+
    labels()+linesLR()+fos+'</svg>';

  document.getElementById('wc-ko').innerHTML=
    '<div style="font-size:13px;color:#666;margin-bottom:12px">'+played+' of '+total+' matches played.</div>'+
    notice+
    '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px">'+svgStr+'</div>';
}

function renderSc(){
  var scorers={};
  matches.forEach(function(m){
    [['goals1',m.team1],['goals2',m.team2]].forEach(function(pair){
      (m[pair[0]]||[]).forEach(function(g){
        if(!g.name) return;
        var k=g.name+'|'+pair[1];
        if(!scorers[k]) scorers[k]={name:g.name,team:pair[1],goals:0};
        scorers[k].goals++;
      });
    });
  });
  var list=Object.keys(scorers).map(function(k){return scorers[k];}).sort(function(a,b){return b.goals-a.goals;});
  if(!list.length){
    document.getElementById('wc-sc').innerHTML='<div style="text-align:center;padding:48px 16px"><div style="font-size:40px;margin-bottom:12px">&#9917;</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">No goals yet</div><div style="font-size:13px;color:#888">Scorers will appear here once matches are played.</div></div>';
    return;
  }
  var html='<div style="margin-bottom:12px;font-size:13px;color:#666">'+list.length+' scorers, '+list.reduce(function(s,p){return s+p.goals;},0)+' goals.</div><div class="sc-grid">';
  list.slice(0,30).forEach(function(p,i){
    var g=teamGrp[p.team],bg=g&&GRP_COLORS[g]?GRP_COLORS[g].bg:'#f5f5f5';
    html+='<div class="sc-row" style="background:'+bg+'"><span class="sc-pos">'+(i+1)+'</span><span class="sc-goals">'+p.goals+'</span><div><div class="sc-name">'+p.name+'</div><div class="sc-team">'+flag(p.team,12)+p.team+'</div></div></div>';
  });
  document.getElementById('wc-sc').innerHTML=html+'</div>';
}

window.wcTvFilter=function(q){
  var term=q.trim().toLowerCase();
  document.querySelectorAll('.tv-day-block').forEach(function(block){
    var rows=block.querySelectorAll('.tv-row');
    var anyVisible=false;
    rows.forEach(function(row){
      var hit=!term||row.getAttribute('data-text').indexOf(term)!==-1;
      row.style.display=hit?'flex':'none';
      if(hit) anyVisible=true;
    });
    var dayHit=!term||block.getAttribute('data-day').indexOf(term)!==-1;
    if(dayHit){rows.forEach(function(row){row.style.display='flex';});anyVisible=true;}
    block.style.display=anyVisible?'block':'none';
  });
};

  {icon:'&#128200;','text':'FIFA uses dynamic pricing for the first time \u2014 prices shift based on demand, teams, venue and when you buy.'},
  {icon:'&#128176;','text':'Four seat categories exist. Cat 1 is the lowest rows (most expensive). Cat 4 is upper corners (cheapest) \u2014 but very limited.'},
  {icon:'&#128683;','text':'A "supporter tier" at $60 exists but is allocated exclusively through national football federations \u2014 not publicly available.'},
  {icon:'&#9878;&#65039;','text':'Football Supporters Europe filed a formal complaint with the European Commission in March 2026 over the pricing practices.'},
  {icon:'&#127967;','text':'Venue matters a lot. MetLife (Final) and SoFi (LA) are consistently the most expensive. Smaller venues like Toronto are cheaper.'},
  {icon:'&#128722;','text':'Resale is wild. Four Final seats were listed at nearly $2.3 million each on FIFA\'s own resale platform. FIFA takes a 30% cut.'},
  {icon:'&#128664;','text':'Getting there adds up too. Hotels in host cities jumped 300%+, parking costs $300+ at some venues, and NJ Transit charged $150 round-trip to MetLife.'}
];

window.openTicketModal=function(matchStr){
  var m;
  try{m=JSON.parse(matchStr.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));}catch(e){return;}
  var round=m.round||'';
  var key=round.indexOf('Group')===0?'group':round;
  var td=TICKET_DATA[key]||TICKET_DATA['group'];
  document.getElementById('tm-title').innerHTML='\uD83D\uDCB2 '+td.label+' Ticket Prices';
  document.getElementById('tm-match').textContent=m.t1+' vs '+m.t2+' \u00b7 '+m.date+' '+m.time;

  var facts=TICKET_FACTS.map(function(f){
    return '<div class="modal-fact"><span class="modal-fact-icon">'+f.icon+'</span><span>'+f.text+'</span></div>';
  }).join('');

  document.getElementById('tm-body').innerHTML=
    '<div class="ticket-range">'+
      '<div><div class="ticket-from">Cheapest (Cat 4)</div><div class="ticket-price">$'+td.low.toLocaleString()+'</div></div>'+
      '<div style="color:#ccc;font-size:20px">\u2194</div>'+
      '<div style="text-align:right"><div class="ticket-from">Most expensive (Cat 1)</div><div class="ticket-price-high">$'+td.high.toLocaleString()+'</div></div>'+
    '</div>'+
    facts+
    '<div class="modal-disclaimer">Prices shown are official FIFA face-value base prices from the October 2025 phase. Dynamic pricing means actual current prices may be significantly higher. Check <strong>fifa.com/tickets</strong> for availability.</div>';

  document.getElementById('ticket-modal').classList.add('open');
  document.body.style.overflow='hidden';
};

window.closeTicketModal=function(){
  document.getElementById('ticket-modal').classList.remove('open');
  document.body.style.overflow='';
};
load();
</script>
</body>
</html>
